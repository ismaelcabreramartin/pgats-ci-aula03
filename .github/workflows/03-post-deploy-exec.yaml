# CI de Nível 03 - Disparo após a conclusão de outra pipeline

# nome da pipeline
name: "Execução por Deploy"

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por evento em outra pipeline = workflow_run

on:
    workflow_run:
      workflows: ["Execução Manual", "Execução Agendada"]  # nomes das pipelines que disparam esta pipeline
      types:
        - completed  # tipo de evento que dispara esta pipeline (pode ser 'completed', 'created', 'requested', etc.)

#tarefas dentro da pipeline = jobs

jobs:
    #nome do job
    e2e-tests:
        # maquina onde o job vai rodar
        runs-on: ubuntu-latest # (from GitHub-hosted runners)
        # runs-on: self-hosted #(máquina própria, não do GitHub)

        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalação do node
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x

            # instalação do Yarn (comentar quando for usar máquina própria self-hosted))
            - name: Instalando Yarn
              run: npm install -g yarn
            
            #   instalação das dependências
            - name: Instalando dependências
              run: yarn
            
            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install

            # instalação do report do Playwright
            - name: Instalando ctrf-json-reporter do Playwright
              run: yarn add -D playwright-ctrf-json-reporter
            
            # executar os testes e2e
            # rodem mesmo se houver testes falhando
            - name: Executando testes e2e
              run: yarn run e2e
              continue-on-error: true

              # ✅ ACTION DO MARKETPLACE
            # Gera sumário de testes na aba Summary do GitHub
            # https://github.com/marketplace/actions/publish-ctrf-test-results-report
            - name: Publicando relatório de testes
              uses: ctrf-io/github-actions-test-reporter@v1
              with:
                report-path: './ctrf-report.json'
              if: always()    # roda mesmo se os testes falharem

            # Salva o relatório HTML como artefato para download
            - name: Salvando relatório HTML
              uses: actions/upload-artifact@v4
              with:
                name: playwright-report
                path: playwright-report/
                retention-days: 7
              if: always()    # roda mesmo se os testes falharem
